name = "opportunity-radar"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[[d1_databases]]
binding = "DB"
database_name = "opportunity-radar-db"
database_id = "9d40c9f3-1797-4a14-81a3-b3f19de36761"

[triggers]
# Runs once a day at 6am UTC. The scheduled() handler itself decides which
# sources are actually "due" based on category + crawl_frequency, so one
# cron schedule is enough -- no need for separate daily/weekly triggers.
crons = ["0 6 * * *"]
